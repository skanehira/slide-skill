<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-problem-solution</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #E8E8E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }
    .slide-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed #CCCCCC;
      flex-shrink: 0;
      background: #FAFAFA;
    }
    .area-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      display: flex;
      padding: 20px 32px;
      gap: 0;
      align-items: stretch;
      flex: 1;
    }
    /* 左右カラム共通 */
    .col-left,
    .col-right {
      flex: 0 0 45%;
      display: flex;
      flex-direction: column;
    }
    .col-header {
      padding: 6px 16px;
      font-size: 13px;
      font-weight: bold;
      color: #555;
      letter-spacing: 0.04em;
    }
    .col-left .col-header {
      background: #F0F0F0;
    }
    .col-right .col-header {
      background: #E8E8E8;
    }
    .col-body {
      flex: 1;
      background: #FAFAFA;
      border: 1px solid #E0E0E0;
      border-top: none;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .numbered-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 13px;
      line-height: 1.55;
      color: #444;
    }
    .number-badge {
      width: 22px;
      height: 22px;
      background: #EEEEEE;
      border: 1px solid #CCCCCC;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: #666;
      flex-shrink: 0;
      margin-top: 1px;
    }
    /* 中央矢印 */
    .center-arrow {
      flex: 0 0 10%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #CCCCCC;
    }
  </style>
</head>
<body>
  <p class="slide-label">[problem-solution]</p>
  <div class="slide">
    <!-- タイトルエリア -->
    <div class="title-area">
      <div class="area-label">Title Area — SLIDE.md 参照</div>
      <div class="title-placeholder">スライドタイトルが入ります</div>
    </div>

    <!-- コンテンツエリア -->
    <div class="content-area">

      <!-- 課題カラム -->
      <div class="col-left">
        <div class="col-header">課題</div>
        <div class="col-body">
          <div class="numbered-item">
            <div class="number-badge">1</div>
            <span>顧客データが複数システムに分散しており、統合的な分析ができない</span>
          </div>
          <div class="numbered-item">
            <div class="number-badge">2</div>
            <span>営業チームと開発チームの情報連携が不足しており、優先順位にズレが生じている</span>
          </div>
          <div class="numbered-item">
            <div class="number-badge">3</div>
            <span>月次レポートの作成に毎回3日以上かかっており、意思決定が遅れている</span>
          </div>
        </div>
      </div>

      <!-- 中央矢印 -->
      <div class="center-arrow">▶</div>

      <!-- 解決策カラム -->
      <div class="col-right">
        <div class="col-header">解決策</div>
        <div class="col-body">
          <div class="numbered-item">
            <div class="number-badge">1</div>
            <span>データ統合プラットフォームの導入により、全データを一元管理する</span>
          </div>
          <div class="numbered-item">
            <div class="number-badge">2</div>
            <span>週次合同ミーティングと共有ダッシュボードで情報連携を強化する</span>
          </div>
          <div class="numbered-item">
            <div class="number-badge">3</div>
            <span>自動レポート生成ツールにより、作成時間を1時間以内に短縮する</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
