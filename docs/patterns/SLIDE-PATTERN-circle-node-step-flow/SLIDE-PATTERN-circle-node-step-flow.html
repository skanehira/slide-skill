<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-circle-node-step-flow</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; display: flex; flex-direction: column; padding: 20px 52px; }
  .lead-text { font-size: 13px; color: #555; line-height: 1.7; margin-bottom: 28px; text-align: center; }
  .flow-row { display: flex; align-items: center; justify-content: center; gap: 0; flex: 1; }
  .node-wrap { display: flex; flex-direction: column; align-items: center; }
  .step-circle { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #BBBBBB; background: #FFFFFF; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .step-circle.goal { background: #555555; border-color: #555555; }
  .step-circle.goal .step-name { color: #FFFFFF; }
  .step-name { font-size: 14px; font-weight: bold; color: #444; text-align: center; line-height: 1.3; }
  .step-sub { font-size: 10px; color: #888; text-align: center; }
  .connector { width: 32px; height: 2px; background: #CCCCCC; flex-shrink: 0; }
  .note-area { font-size: 11px; color: #888; line-height: 1.7; padding-top: 12px; }
</style>
</head>
<body>
<p class="slide-label">[circle-node-step-flow]</p>
<div class="slide">
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <div class="content-area">
    <div class="area-label">Lead Text</div>
    <div class="lead-text">リード文が入ります。このフローについての説明を1〜2行で記述します。</div>
    <div class="flow-row">
      <div class="node-wrap">
        <div class="step-circle">
          <div class="step-name">ステップ1</div>
          <div class="step-sub">補足</div>
        </div>
      </div>
      <div class="connector"></div>
      <div class="node-wrap">
        <div class="step-circle">
          <div class="step-name">ステップ2</div>
          <div class="step-sub">(補足)</div>
        </div>
      </div>
      <div class="connector"></div>
      <div class="node-wrap">
        <div class="step-circle">
          <div class="step-name">ステップ3</div>
        </div>
      </div>
      <div class="connector"></div>
      <div class="node-wrap">
        <div class="step-circle">
          <div class="step-name">ステップ4</div>
        </div>
      </div>
      <div class="connector"></div>
      <div class="node-wrap">
        <div class="step-circle goal">
          <div class="step-name">ゴール</div>
          <div class="step-sub" style="color:#DDD;">最終ステップ</div>
        </div>
      </div>
    </div>
    <div class="note-area">
      <div class="area-label">Note (optional)</div>
      ※ 注記テキストが入ります。補足・条件・例外事項などを記述します。
    </div>
  </div>
</div>
</body>
</html>
