<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-agenda-toc</title>
  <style>
    body {
      background: #E8E8E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      font-family: sans-serif;
      margin: 0;
    }

    .slide-label {
      font-size: 12px;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      align-self: flex-start;
      margin-left: calc(50% - 480px);
    }

    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      padding: 40px 80px 40px 64px;
      display: flex;
      flex-direction: column;
    }

    .area-label {
      font-size: 11px;
      color: #999999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    /* ヘッダーエリア */
    .header-area {
      margin-bottom: 28px;
    }

    .section-label-text {
      font-size: 11px;
      font-weight: bold;
      color: #AAAAAA;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .title-text {
      font-size: 28px;
      font-weight: bold;
      color: #333333;
      line-height: 1.2;
    }

    /* リストエリア */
    .list-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
    }

    /* 各行 */
    .toc-row {
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    .toc-number {
      font-size: 22px;
      font-weight: bold;
      color: #555555;
      width: 48px;
      flex-shrink: 0;
      line-height: 1;
    }

    .toc-divider {
      font-size: 18px;
      color: #CCCCCC;
      margin: 0 12px;
      flex-shrink: 0;
      line-height: 1;
    }

    .toc-item-name {
      font-size: 15px;
      color: #444444;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .toc-leader {
      flex: 1;
      border-bottom: 1px dotted #CCCCCC;
      margin: 0 12px;
      position: relative;
      top: -4px;
    }

    .toc-page {
      font-size: 13px;
      color: #777777;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* エリアラベル用のラッパー */
    .area-label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

  <p class="slide-label">[agenda-toc]</p>

  <div class="slide">

    <!-- ヘッダーエリア -->
    <div class="header-area">
      <div class="area-label">Section Label</div>
      <div class="section-label-text">AGENDA</div>
      <div class="area-label" style="margin-top:6px;">Title (H1)</div>
      <div class="title-text">目次</div>
    </div>

    <!-- リストエリア -->
    <div class="list-area">

      <div>
        <div class="area-label" style="margin-bottom:4px;">TOC Row (× 項目数)</div>
      </div>

      <!-- 行 01 -->
      <div class="toc-row">
        <div class="toc-number">01</div>
        <div class="toc-divider">|</div>
        <div class="toc-item-name">セクション名が入ります</div>
        <div class="toc-leader"></div>
        <div class="toc-page">p.3</div>
      </div>

      <!-- 行 02 -->
      <div class="toc-row">
        <div class="toc-number">02</div>
        <div class="toc-divider">|</div>
        <div class="toc-item-name">セクション名が入ります</div>
        <div class="toc-leader"></div>
        <div class="toc-page">p.10</div>
      </div>

      <!-- 行 03 -->
      <div class="toc-row">
        <div class="toc-number">03</div>
        <div class="toc-divider">|</div>
        <div class="toc-item-name">セクション名が入ります</div>
        <div class="toc-leader"></div>
        <div class="toc-page">p.18</div>
      </div>

      <!-- 行 04 -->
      <div class="toc-row">
        <div class="toc-number">04</div>
        <div class="toc-divider">|</div>
        <div class="toc-item-name">セクション名が入ります</div>
        <div class="toc-leader"></div>
        <div class="toc-page">p.25</div>
      </div>

      <!-- 行 05 -->
      <div class="toc-row">
        <div class="toc-number">05</div>
        <div class="toc-divider">|</div>
        <div class="toc-item-name">セクション名が入ります</div>
        <div class="toc-leader"></div>
        <div class="toc-page">p.32</div>
      </div>

      <!-- 行 06 -->
      <div class="toc-row">
        <div class="toc-number">06</div>
        <div class="toc-divider">|</div>
        <div class="toc-item-name">セクション名が入ります</div>
        <div class="toc-leader"></div>
        <div class="toc-page">p.40</div>
      </div>

    </div><!-- /list-area -->

  </div><!-- /slide -->

</body>
</html>
