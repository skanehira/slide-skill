<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-vertical-step-flow</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; padding: 16px 120px; display: flex; flex-direction: column; justify-content: center; gap: 0; }
  .step-row { display: flex; align-items: stretch; }
  .step-label-cell { width: 120px; background: #E0E0E0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #555; padding: 10px; flex-shrink: 0; }
  .step-label-cell.final { background: #C0C0C0; color: #333; }
  .step-content-cell { flex: 1; border: 1px solid #E0E0E0; border-left: none; padding: 10px 20px; display: flex; align-items: center; font-size: 13px; color: #444; background: #FAFAFA; }
  .step-content-cell.final { background: #F0F0F0; font-weight: bold; }
  .arrow-row { display: flex; justify-content: center; padding: 3px 0; }
  .arrow { font-size: 18px; color: #BBBBBB; }
</style>
</head>
<body>
<p class="slide-label">[vertical-step-flow]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="area-label" style="margin-bottom:8px;">縦ステップフロー</div>
    <div class="step-row">
      <div class="step-label-cell">STEP 1</div>
      <div class="step-content-cell">ステップ1の内容が入ります</div>
    </div>
    <div class="arrow-row"><div class="arrow">▼</div></div>
    <div class="step-row">
      <div class="step-label-cell">STEP 2</div>
      <div class="step-content-cell">ステップ2の内容が入ります</div>
    </div>
    <div class="arrow-row"><div class="arrow">▼</div></div>
    <div class="step-row">
      <div class="step-label-cell">STEP 3</div>
      <div class="step-content-cell">ステップ3の内容が入ります</div>
    </div>
    <div class="arrow-row"><div class="arrow">▼</div></div>
    <div class="step-row">
      <div class="step-label-cell">STEP 4</div>
      <div class="step-content-cell">ステップ4の内容が入ります</div>
    </div>
    <div class="arrow-row"><div class="arrow">▼</div></div>
    <div class="step-row">
      <div class="step-label-cell final">STEP 5</div>
      <div class="step-content-cell final">最終ステップの内容（強調）が入ります</div>
    </div>
  </div>
</div>
</body>
</html>
