<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-cover-with-image-left</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; }
  /* 左カラム：画像エリア */
  .left-col { width: 43%; flex-shrink: 0; background: #F0F0F0; border-right: 1px dashed #CCCCCC; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  /* 右カラム：テキストエリア */
  .right-col { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 48px 48px; }
  .category-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 14px; }
  .main-title { font-size: 30px; font-weight: bold; color: #222; line-height: 1.3; margin-bottom: 16px; }
  .description { font-size: 13px; color: #555; line-height: 1.7; margin-bottom: 20px; }
  .divider { width: 100%; height: 1px; background: #EEEEEE; margin-bottom: 16px; }
  .meta-info { font-size: 12px; color: #888; line-height: 1.8; }
</style>
</head>
<body>
<p class="slide-label">[cover-with-image-left]</p>
<div class="slide">
  <!-- 左カラム：画像プレースホルダー -->
  <div class="left-col">
    <div class="area-label">Image Area</div>
    <div style="font-size: 12px; color: #BBBBBB; text-align: center; padding: 0 24px;">画像・写真が入ります<br>（高さ100%で配置）</div>
  </div>
  <!-- 右カラム：テキストエリア -->
  <div class="right-col">
    <div class="category-label">提案書 / カテゴリラベル</div>
    <div class="main-title">メインタイトルが<br>ここに入ります</div>
    <div class="description">
      プレゼンテーションの内容を簡潔に説明する1〜2行の概要テキストが入ります。
    </div>
    <div class="divider"></div>
    <div class="meta-info">
      2026年6月5日　／　株式会社〇〇<br>
      担当：氏名
    </div>
  </div>
</div>
</body>
</html>
