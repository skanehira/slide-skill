<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-two-chart-panel</title>
  <style>
    /* ページ背景・中央寄せ */
    body {
      background: #E8E8E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      font-family: sans-serif;
      margin: 0;
    }

    /* スライドラベル */
    .slide-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }

    /* スライド本体 960×540px */
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* タイトルエリア */
    .slide-title {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed #CCCCCC;
      background: #FAFAFA;
      flex-shrink: 0;
    }
    .slide-title h2 {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin: 0;
    }
    .slide-title p {
      font-size: 12px;
      color: #888;
      margin: 4px 0 0;
    }

    /* コンテンツエリア */
    .content {
      display: flex;
      flex: 1;
      padding: 16px 24px;
      gap: 20px;
    }

    /* ── グラフパネル共通 ── */
    .chart-panel {
      flex: 1;
      border: 1px solid #E0E0E0;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
    }

    /* パネルヘッダー */
    .panel-header {
      padding: 8px 16px;
      background: #F5F5F5;
      border-bottom: 1px solid #E0E0E0;
      border-radius: 4px 4px 0 0;
    }
    .panel-header h3 {
      font-size: 13px;
      font-weight: bold;
      color: #333;
      margin: 0;
    }

    /* パネル本体 */
    .panel-body {
      flex: 1;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* ── 左パネル専用：ドーナツ＋凡例リスト ── */
    .legend-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #555;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-label {
      flex: 1;
    }
    .legend-value {
      font-weight: bold;
      color: #333;
    }

    /* ── 右パネル専用：ドーナツ2点横並び ── */
    .donut-pair {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .donut-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .donut-item h4 {
      font-size: 11px;
      font-weight: bold;
      color: #555;
      margin: 0;
      text-align: center;
    }

    .area-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <p class="slide-label">[two-chart-panel]</p>

  <div class="slide">

    <!-- タイトルエリア -->
    <div class="slide-title">
      <h2>カテゴリ別データ比較分析</h2>
      <p>製品構成比と地域別売上シェアの並列比較</p>
    </div>

    <!-- コンテンツエリア -->
    <div class="content">

      <!-- 左パネル：ドーナツ＋凡例リスト -->
      <div class="chart-panel">
        <div class="panel-header">
          <h3>製品カテゴリ構成比</h3>
        </div>
        <div class="panel-body">

          <!-- ドーナツグラフ（4分割） -->
          <svg width="100" height="100" viewBox="0 0 100 100" style="flex-shrink:0;">
            <!-- ベース -->
            <circle cx="50" cy="50" r="36" fill="none" stroke="#F0F0F0" stroke-width="18"/>
            <!-- セグメント1（40%） stroke-dasharray=226.19 * 0.4=90.5 / offset=0 → top開始：-56.5 -->
            <circle cx="50" cy="50" r="36" fill="none" stroke="#AAAAAA" stroke-width="18"
              stroke-dasharray="90.5 135.69" stroke-dashoffset="56.5"/>
            <!-- セグメント2（30%） -->
            <circle cx="50" cy="50" r="36" fill="none" stroke="#BBBBBB" stroke-width="18"
              stroke-dasharray="67.9 158.3" stroke-dashoffset="-34"/>
            <!-- セグメント3（20%） -->
            <circle cx="50" cy="50" r="36" fill="none" stroke="#CCCCCC" stroke-width="18"
              stroke-dasharray="45.2 181.0" stroke-dashoffset="-101.9"/>
            <!-- セグメント4（10%） -->
            <circle cx="50" cy="50" r="36" fill="none" stroke="#DDDDDD" stroke-width="18"
              stroke-dasharray="22.6 203.6" stroke-dashoffset="-147.1"/>
            <!-- 中央白抜き -->
            <circle cx="50" cy="50" r="27" fill="#FFFFFF"/>
            <text x="50" y="54" text-anchor="middle" font-size="9" fill="#888">構成比</text>
          </svg>

          <!-- 凡例リスト -->
          <div class="legend-list">
            <div class="legend-item">
              <span class="legend-dot" style="background:#AAAAAA;"></span>
              <span class="legend-label">製品Aシリーズ</span>
              <span class="legend-value">40%</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#BBBBBB;"></span>
              <span class="legend-label">製品Bシリーズ</span>
              <span class="legend-value">30%</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#CCCCCC;"></span>
              <span class="legend-label">製品Cシリーズ</span>
              <span class="legend-value">20%</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#DDDDDD;"></span>
              <span class="legend-label">その他</span>
              <span class="legend-value">10%</span>
            </div>
          </div>

        </div>
      </div>

      <!-- 右パネル：ドーナツ2点横並び -->
      <div class="chart-panel">
        <div class="panel-header">
          <h3>地域別売上シェア比較</h3>
        </div>
        <div class="panel-body" style="justify-content:center;">

          <div class="donut-pair">

            <!-- ドーナツ1：今期 -->
            <div class="donut-item">
              <svg width="90" height="90" viewBox="0 0 90 90">
                <circle cx="45" cy="45" r="32" fill="none" stroke="#E8E8E8" stroke-width="16"/>
                <!-- 65% -->
                <circle cx="45" cy="45" r="32" fill="none" stroke="#BBBBBB" stroke-width="16"
                  stroke-dasharray="130.6" stroke-dashoffset="50.3"/>
                <circle cx="45" cy="45" r="24" fill="#FFFFFF"/>
                <text x="45" y="41" text-anchor="middle" font-size="8" fill="#888">国内</text>
                <text x="45" y="52" text-anchor="middle" font-size="15" fill="#333" font-weight="bold">65%</text>
              </svg>
              <h4>今期（2024）</h4>
              <span style="font-size:10px; color:#999;">国内シェア</span>
            </div>

            <!-- ドーナツ2：前期 -->
            <div class="donut-item">
              <svg width="90" height="90" viewBox="0 0 90 90">
                <circle cx="45" cy="45" r="32" fill="none" stroke="#E8E8E8" stroke-width="16"/>
                <!-- 52% -->
                <circle cx="45" cy="45" r="32" fill="none" stroke="#CCCCCC" stroke-width="16"
                  stroke-dasharray="104.5" stroke-dashoffset="50.3"/>
                <circle cx="45" cy="45" r="24" fill="#FFFFFF"/>
                <text x="45" y="41" text-anchor="middle" font-size="8" fill="#888">国内</text>
                <text x="45" y="52" text-anchor="middle" font-size="15" fill="#333" font-weight="bold">52%</text>
              </svg>
              <h4>前期（2023）</h4>
              <span style="font-size:10px; color:#999;">国内シェア</span>
            </div>

          </div>

        </div>
      </div>

    </div><!-- /content -->

  </div><!-- /slide -->

</body>
</html>
