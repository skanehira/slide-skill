<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-minimal-disclaimer</title>
  <style>
    body {
      background: #E8E8E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      margin: 0;
      font-family: sans-serif;
    }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .title-area {
      flex-shrink: 0;
      background: #FAFAFA;
      padding: 10px 40px;
      border-bottom: 1px dashed #CCCCCC;
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .pattern-label {
      margin-top: 16px;
      font-size: 12px;
      color: #888;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="title-area">Title Area — SLIDE.md 参照</div>
    <div style="flex:1; display:flex; flex-direction:column; padding:0 52px;">
      <!-- ヘッダー：ロゴ+会社名 -->
      <div style="padding-top:20px; display:flex; align-items:center; gap:12px; flex-shrink:0;">
        <div style="width:44px; height:44px; background:#F0F0F0; border:1px dashed #CCCCCC; display:flex; align-items:center; justify-content:center; font-size:10px; color:#AAAAAA; border-radius:4px;">LOGO</div>
        <div>
          <div style="font-size:11px; color:#999; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:2px;">Header — Logo / Company</div>
          <div style="font-size:13px; font-weight:bold; color:#333;">会社名</div>
          <div style="font-size:11px; color:#999;">サービス名</div>
        </div>
      </div>
      <!-- ボディ：タイトル+発表者 -->
      <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
        <div style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;">Main Title / Presenter / Date</div>
        <div style="font-size:30px; font-weight:bold; color:#333; margin-bottom:16px; line-height:1.3;">メインタイトルが<br>ここに入ります</div>
        <div style="font-size:14px; font-weight:600; color:#555; margin-bottom:6px;">発表者氏名</div>
        <div style="font-size:13px; color:#777; margin-bottom:4px;">2025年X月X日 イベント名</div>
      </div>
      <!-- フッター：免責事項 -->
      <div style="flex-shrink:0; border-top:1px solid #EEEEEE; padding:10px 0 16px;">
        <div style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">Footer — Disclaimer</div>
        <div style="font-size:10px; color:#999; line-height:1.7;">
          <span style="font-weight:600; color:#777;">商号等</span>　〇〇〇〇株式会社　〇〇商品取引業者　〇〇財務局長（〇〇）第XXXX号<br>
          <span style="font-weight:600; color:#777;">加入協会</span>　日本〇〇業協会、一般社団法人 日本〇〇投資顧問業協会、一般社団法人 第〇種〇〇商品取引業協会
        </div>
      </div>
    </div>
  </div>
  <div class="pattern-label">SLIDE-PATTERN: cover-minimal-disclaimer</div>
</body>
</html>
