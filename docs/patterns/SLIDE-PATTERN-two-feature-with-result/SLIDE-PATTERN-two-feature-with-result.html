<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-two-feature-with-result</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; }
  /* タイトルエリア */
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  /* コンテンツエリア */
  .content-area { flex: 1; display: flex; flex-direction: column; padding: 12px 48px; gap: 12px; }
  /* 上部説明テキスト */
  .upper-desc { font-size: 12px; color: #555; line-height: 1.7; }
  /* 中段カード群 */
  .cards-row { display: flex; gap: 16px; }
  /* 機能カード */
  .feature-card { flex: 1; border: 1px solid #CCCCCC; background: #F8F8F8; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .card-label { font-size: 11px; color: #999; letter-spacing: 0.05em; }
  .card-heading { font-size: 14px; font-weight: bold; color: #333; line-height: 1.4; }
  .card-desc { font-size: 12px; color: #666; line-height: 1.7; }
  /* 矢印エリア */
  .arrow-area { text-align: center; font-size: 20px; color: #CCCCCC; line-height: 1; }
  /* 結果ボックス */
  .result-box { border: 1px solid #CCCCCC; background: #F0F0F0; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  .result-label { font-size: 11px; color: #999; white-space: nowrap; }
  .result-text { font-size: 14px; font-weight: bold; color: #333; }
</style>
</head>
<body>
<p class="slide-label">[two-feature-with-result]</p>
<div class="slide">
  <!-- タイトルエリア -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <!-- 上部説明テキスト -->
    <div class="upper-desc">
      上部の説明テキストが1〜2行で入ります。2つの機能カードの背景や前提となる文章を簡潔に記述してください。
    </div>
    <!-- 中段：機能カード2枚横並び -->
    <div class="cards-row">
      <div class="feature-card">
        <div class="card-label">機能 01</div>
        <div class="card-heading">機能・施策1の見出しテキスト</div>
        <div class="card-desc">
          機能1の説明テキストが入ります。2行程度で詳細や特徴を記述します。<br>
          要点を簡潔にまとめてください。
        </div>
      </div>
      <div class="feature-card">
        <div class="card-label">機能 02</div>
        <div class="card-heading">機能・施策2の見出しテキスト</div>
        <div class="card-desc">
          機能2の説明テキストが入ります。2行程度で詳細や特徴を記述します。<br>
          要点を簡潔にまとめてください。
        </div>
      </div>
    </div>
    <!-- 矢印 -->
    <div class="arrow-area">▼</div>
    <!-- 結果ボックス -->
    <div class="result-box">
      <div class="result-label">実績・効果</div>
      <div class="result-text">2つの機能・施策がもたらす成果や実績のテキストが入ります</div>
    </div>
  </div>
</div>
</body>
</html>
