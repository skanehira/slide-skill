<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-comparison-matrix-table</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; padding: 16px 40px; display: flex; flex-direction: column; }
  table { width: 100%; border-collapse: collapse; flex: 1; }
  th { font-size: 12px; font-weight: bold; padding: 8px 12px; border: 1px solid #E0E0E0; text-align: center; background: #F0F0F0; color: #444; }
  th.highlight { background: #D8D8D8; color: #222; }
  td { font-size: 12px; padding: 8px 12px; border: 1px solid #E8E8E8; vertical-align: top; color: #555; text-align: center; }
  td.row-label { text-align: left; font-weight: bold; color: #333; background: #FAFAFA; }
  td.highlight { background: #F5F5F5; color: #222; font-weight: 500; }
</style>
</head>
<body>
<p class="slide-label">[comparison-matrix-table]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="area-label">比較マトリクステーブル</div>
    <table>
      <thead>
        <tr>
          <th style="width:140px;"></th>
          <th>対象A</th>
          <th>対象B</th>
          <th class="highlight">対象C（強調）</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="row-label">比較軸1</td>
          <td>内容テキスト</td>
          <td>内容テキスト</td>
          <td class="highlight">強調内容テキスト</td>
        </tr>
        <tr>
          <td class="row-label">比較軸2</td>
          <td>内容テキスト</td>
          <td>内容テキスト</td>
          <td class="highlight">強調内容テキスト</td>
        </tr>
        <tr>
          <td class="row-label">比較軸3</td>
          <td>内容テキスト</td>
          <td>内容テキスト</td>
          <td class="highlight">強調内容テキスト</td>
        </tr>
        <tr>
          <td class="row-label">比較軸4</td>
          <td>内容テキスト</td>
          <td>内容テキスト</td>
          <td class="highlight">強調内容テキスト</td>
        </tr>
        <tr>
          <td class="row-label">比較軸5</td>
          <td>内容テキスト</td>
          <td>内容テキスト</td>
          <td class="highlight">強調内容テキスト</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
