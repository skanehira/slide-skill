<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-horizontal-timeline-cards</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; padding: 16px 32px 20px; display: flex; flex-direction: column; }
  .timeline-row { display: flex; align-items: center; padding: 0 24px; margin-bottom: 16px; position: relative; }
  .timeline-line { position: absolute; top: 50%; left: 24px; right: 24px; height: 2px; background: #DDDDDD; z-index: 0; }
  .timeline-dots { display: flex; justify-content: space-around; width: 100%; position: relative; z-index: 1; }
  .timeline-dot { width: 14px; height: 14px; border-radius: 50%; background: #CCCCCC; border: 2px solid #FFFFFF; }
  .cards-row { display: flex; gap: 12px; flex: 1; }
  .card { flex: 1; background: #F8F8F8; border: 1px solid #E0E0E0; border-radius: 6px; padding: 14px 16px; display: flex; flex-direction: column; }
  .step-label { font-size: 10px; color: #888; margin-bottom: 2px; }
  .step-number { font-size: 28px; font-weight: bold; color: #CCCCCC; line-height: 1.1; margin-bottom: 6px; }
  .card-heading { font-size: 13px; font-weight: bold; color: #333; margin-bottom: 8px; line-height: 1.3; }
  .card-bullets { list-style: none; padding: 0; margin: 0; }
  .card-bullets li { font-size: 11px; color: #666; padding: 2px 0; line-height: 1.5; }
  .card-bullets li::before { content: "▶ "; color: #BBBBBB; font-size: 9px; }
</style>
</head>
<body>
<p class="slide-label">[horizontal-timeline-cards]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="area-label" style="margin-bottom:4px;">タイムライン</div>
    <div class="timeline-row">
      <div class="timeline-line"></div>
      <div class="timeline-dots">
        <div class="timeline-dot"></div>
        <div class="timeline-dot"></div>
        <div class="timeline-dot"></div>
        <div class="timeline-dot"></div>
      </div>
    </div>
    <div class="area-label">ステップカード</div>
    <div class="cards-row">
      <div class="card">
        <div class="step-label">STEP</div>
        <div class="step-number">01</div>
        <div class="card-heading">見出しが入ります</div>
        <ul class="card-bullets">
          <li>詳細ポイント1</li>
          <li>詳細ポイント2</li>
        </ul>
      </div>
      <div class="card">
        <div class="step-label">STEP</div>
        <div class="step-number">02</div>
        <div class="card-heading">見出しが入ります</div>
        <ul class="card-bullets">
          <li>詳細ポイント1</li>
          <li>詳細ポイント2</li>
        </ul>
      </div>
      <div class="card">
        <div class="step-label">STEP</div>
        <div class="step-number">03</div>
        <div class="card-heading">見出しが入ります</div>
        <ul class="card-bullets">
          <li>詳細ポイント1</li>
          <li>詳細ポイント2</li>
        </ul>
      </div>
      <div class="card">
        <div class="step-label">STEP</div>
        <div class="step-number">04</div>
        <div class="card-heading">見出しが入ります</div>
        <ul class="card-bullets">
          <li>詳細ポイント1</li>
          <li>詳細ポイント2</li>
        </ul>
      </div>
    </div>
  </div>
</div>
</body>
</html>
