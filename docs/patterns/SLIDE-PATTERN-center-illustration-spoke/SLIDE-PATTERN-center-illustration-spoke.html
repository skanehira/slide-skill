<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-center-illustration-spoke</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; position: relative; overflow: hidden; }
  .spoke-icon { width: 64px; height: 64px; border-radius: 50%; background: #F0F0F0; border: 1px dashed #CCCCCC; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #AAAAAA; }
  .spoke-item { display: flex; flex-direction: column; align-items: center; gap: 5px; position: absolute; }
  .spoke-label { font-size: 11px; color: #666; text-align: center; font-weight: 600; }
  .center-hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .center-bg { width: 160px; height: 130px; background: #F0F0F0; border-radius: 50% 50% 0 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
</style>
</head>
<body>
<p class="slide-label">[center-illustration-spoke]</p>
<div class="slide">
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <div class="content-area">
    <!-- 中央ハブ -->
    <div class="center-hub">
      <div class="center-bg">
        <div class="area-label">Center Hub</div>
        <div style="font-size:14px; font-weight:bold; color:#555;">サービス名</div>
        <div style="font-size:11px; color:#888;">プラットフォーム</div>
      </div>
      <div style="font-size:10px; color:#999; text-align:center; margin-top:2px;">人物イラスト<br>がここに入る</div>
    </div>
    <!-- 上スポーク -->
    <div class="spoke-item" style="top:14px; left:50%; transform:translateX(-50%);">
      <div class="spoke-icon">★</div>
      <div class="spoke-label">データソース1</div>
    </div>
    <!-- 左上スポーク -->
    <div class="spoke-item" style="top:60px; left:80px;">
      <div class="spoke-icon">◆</div>
      <div class="spoke-label">データソース2</div>
    </div>
    <!-- 左下スポーク -->
    <div class="spoke-item" style="bottom:40px; left:80px;">
      <div class="spoke-icon">●</div>
      <div class="spoke-label">データソース3</div>
    </div>
    <!-- 右上スポーク -->
    <div class="spoke-item" style="top:60px; right:80px;">
      <div class="spoke-icon">▲</div>
      <div class="spoke-label">データソース4</div>
    </div>
    <!-- 右下スポーク -->
    <div class="spoke-item" style="bottom:40px; right:80px;">
      <div class="spoke-icon">■</div>
      <div class="spoke-label">データソース5</div>
    </div>
    <!-- 矢印の説明ラベル -->
    <div style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%); font-size:10px; color:#AAAAAA;">← 矢印は各スポークから中央ハブへ向かう</div>
  </div>
</div>
</body>
</html>
