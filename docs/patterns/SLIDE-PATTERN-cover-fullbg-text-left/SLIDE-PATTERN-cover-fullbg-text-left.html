<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-fullbg-text-left</title>
  <style>
    body {
      background: #E8E8E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      margin: 0;
      font-family: sans-serif;
    }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .title-area {
      flex-shrink: 0;
      background: #FAFAFA;
      padding: 10px 40px;
      border-bottom: 1px dashed #CCCCCC;
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .pattern-label {
      margin-top: 16px;
      font-size: 12px;
      color: #888;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="title-area">Title Area — SLIDE.md 参照</div>
    <div style="flex:1; display:flex; overflow:hidden;">
      <!-- 左：テキストエリア -->
      <div style="width:55%; padding:32px 40px 40px 52px; display:flex; flex-direction:column; justify-content:flex-end;">
        <div style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;">Main Title</div>
        <div style="font-size:28px; font-weight:bold; color:#333; line-height:1.3; margin-bottom:16px;">タイトルが<br>ここに入ります<br>複数行対応</div>
        <div style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">Subtitle / Presenter / Affiliation</div>
        <div style="font-size:13px; color:#555; margin-bottom:6px;">イベント名 YYYY/MM/DD</div>
        <div style="font-size:14px; font-weight:600; color:#444; margin-bottom:4px;">発表者名 (@SNSハンドル)</div>
        <div style="font-size:12px; color:#777;">所属会社名</div>
      </div>
      <!-- 右：背景画像エリア -->
      <div style="width:45%; background:#F0F0F0; border-left:1px dashed #CCCCCC; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px;">
        <div style="font-size:11px; color:#AAAAAA; text-transform:uppercase; letter-spacing:0.08em;">Background</div>
        <div style="font-size:11px; color:#AAAAAA;">Image / Texture</div>
      </div>
    </div>
  </div>
  <div class="pattern-label">SLIDE-PATTERN: cover-fullbg-text-left</div>
</body>
</html>
