  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 */\n  --spectrum-magenta: #C158A8;\n  --spectrum-pink:    #D96570; /* signature gradient end */\n  --spectrum-coral:   #EA6759;\n  --spectrum-red:     #EA4335; /* Google Red */\n  --spectrum-orange:  #F29550;\n  --spectrum-gold:    #E6A817;\n  --spectrum-yellow:  #F2C200;\n  --spectrum-lime:    #9BC53D;\n  --spectrum-green:   #34A853; /* Google Green */\n  --spectrum-teal:    #1FA885;\n  --spectrum-cyan:    #2AA7C4;\n\n  /* ---- Brand primary (Gemini blue ramp) ---- */\n  --blue-50:  #EAF1FE;\n  --blue-100: #D2E1FD;\n  --blue-200: #A6C4FB;\n  --blue-300: #79A6F9;\n  --blue-400: #4285F4; /* primary */\n  --blue-500: #1A73E8; /* primary pressed / links */\n  --blue-600: #1666CE;\n  --blue-700: #1257AE;\n  --blue-800: #0E4488;\n\n  /* ---- Purple ramp (gradient mid) ---- */\n  --purple-100: #ECE3F7;\n  --purple-300: #C4A8E4;\n  --purple-500: #9168C0;\n  --purple-700: #6E47A0;\n\n  /* ---- Pink ramp (gradient end) ---- */\n  --pink-100: #FBE4E7;\n  --pink-300: #EDA6AE;\n  --pink-500: #D96570;\n  --pink-700: #B7414D;\n\n  /* ---- Neutrals: Google \"surface\" family, faintly blue-tinted ---- */\n  --neutral-0:   #FFFFFF;\n  --neutral-25:  #FBFCFE;\n  --neutral-50:  #F8FAFD; /* default app canvas */\n  --neutral-100: #F0F4F9; /* surface container */\n  --neutral-200: #E9EEF6;\n  --neutral-300: #DADCE0; /* hairline border */\n  --neutral-400: #C4C7C5;\n  --neutral-500: #9AA0A6;\n  --neutral-600: #5E5E5E;\n  --neutral-700: #444746; /* secondary text */\n  --neutral-800: #2D2F31;\n  --neutral-900: #1F1F1F; /* primary text / near-black */\n  --neutral-950: #131314; /* dark-theme canvas */\n\n  /* ---- Semantic ---- */\n  --success: #34A853;\n  --success-surface: #E6F4EA;\n  --warning: #EA8600;\n  --warning-surface: #FEF3E0;\n  --error:   #EA4335;\n  --error-surface: #FCE8E6;\n  --info:    #4285F4;\n  --info-surface: #EAF1FE;\n\n  /* ---- Semantic aliases (use these in product UI) ---- */\n  --color-primary:        var(--blue-400);\n  --color-primary-hover:  var(--blue-500);\n  --color-primary-press:  var(--blue-600);\n  --color-on-primary:     #FFFFFF;\n  --color-accent:         var(--purple-500);\n\n  --text-primary:    var(--neutral-900);\n  --text-secondary:  var(--neutral-700);\n  --text-tertiary:   var(--neutral-600);\n  --text-disabled:   var(--neutral-500);\n  --text-on-accent:  #FFFFFF;\n  --text-link:       var(--blue-500);\n\n  --surface-canvas:   var(--neutral-50);\n  --surface-card:     var(--neutral-0);\n  --surface-raised:   var(--neutral-0);\n  --surface-sunken:   var(--neutral-100);\n  --surface-hover:    var(--neutral-100);\n  --surface-active:   var(--neutral-200);\n\n  --border-subtle:   var(--neutral-300);\n  --border-strong:   var(--neutral-400);\n  --border-focus:    var(--blue-400);\n\n  /* ---- Signature gradients ---- */\n  /* The recognizable 3-stop Gemini gradient */\n  --gradient-gemini: linear-gradient(135deg, #4285F4 0%, #9168C0 50%, #D96570 100%); /* @kind other */\n  /* Softer wash for large backgrounds */\n  --gradient-gemini-soft: linear-gradient(135deg, #6BA0F7 0%, #A98BD0 55%, #E08C94 100%); /* @kind other */\n  /* The full spark spectrum — sweep through every hue */\n  --gradient-spark: conic-gradient(from 200deg at 50% 50%,\n      #4285F4, #9168C0, #D96570, #EA4335, #F2C200, #34A853, #1FA885, #4285F4); /* @kind other */\n  /* Text-fill gradient (for gradient headlines) */\n  --gradient-text: linear-gradient(90deg, #4285F4 0%, #9168C0 45%, #D96570 100%);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   GEMINI COLOR SYSTEM — typography.css\n   ============================================================ */\n:root {\n  /* Families */\n  --font-display: 'Manrope', 'Google Sans', system-ui, -apple-system, sans-serif;\n  --font-body:    'Manrope', 'Google Sans Text', system-ui, -apple-system, sans-serif;\n  --font-mono:    'Roboto Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* Type scale (display → caption) */\n  --text-display-lg: 57px;\n  --text-display-md: 45px;\n  --text-display-sm: 36px;\n  --text-headline:   28px;\n  --text-title-lg:   22px;\n  --text-title:      18px;\n  --text-body-lg:    16px;\n  --text-body:       14px;\n  --text-label:      13px;\n  --text-caption:    12px;\n\n  /* Weights */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-extra:    800;\n\n  /* Line heights */\n  --leading-tight:   1.12;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* Letter spacing */\n  --tracking-tight:  -0.02em;\n  --tracking-snug:   -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.02em;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   GEMINI COLOR SYSTEM — spacing.css\n   4px base grid, radii, and the Material-derived pill radius.\n   ============================================================ */\n:root {\n  /* Spacing scale (4px base) */\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* Radii — Gemini/Material lean soft & round */\n  --radius-xs:   4px;\n  --radius-sm:   8px;\n  --radius-md:   12px;\n  --radius-lg:   16px;\n  --radius-xl:   24px;\n  --radius-2xl:  28px;\n  --radius-pill: 999px;\n  --radius-full: 50%;\n\n  /* Container widths */\n  --width-prose:    680px;\n  --width-content:  1080px;\n  --width-wide:     1280px;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   GEMINI COLOR SYSTEM — elevation.css\n   Soft, low-contrast Material shadows + brand-tinted focus ring.\n   ============================================================ */\n:root {\n  --shadow-xs: 0 1px 2px rgba(31,31,31,0.06);\n  --shadow-sm: 0 1px 3px rgba(31,31,31,0.08), 0 1px 2px rgba(31,31,31,0.06);\n  --shadow-md: 0 2px EM — colors.css\n   The full \"spark\" spectrum + Google-derived neutrals & semantics.\n   ============================================================ */\n:root {\n  /* ---- Spectrum: the Gemini spark, in spectral order ---- */\n  --spectrum-blue:    #4285F4; /* Google Blue — the anchor */\n  --spectrum-azure:   #2E7CF6;\n  --spectrum-indigo:  #5C6BF0;\n  --spectrum-violet:  #7B5EE6;\n  --spectrum-purple:  #9168C0; /* signature mid-gradient */\n  --spectrum-magenta: #C158A8;\n  --spectrum-pink:    #D96570; /* signature gradient end */\n  --spectrum-coral:   #EA6759;\n  --spectrum-red:     #EA4335; /* Google Red */\n  --spectrum-orange:  #F29550;\n  --spectrum-gold:    #E6A817;\n  --spectrum-yellow:  #F2C200;\n  --spectrum-lime:    #9BC53D;\n  --spectrum-green:   #34A853; /* Google Green */\n  --spectrum-teal:    #1FA885;\n  --spectrum-cyan:    #2AA7C4;\n\n  /* ---- Brand primary (Gemini blue ramp) ---- */\n  --blue-50:  #EAF1FE;\n  --blue-100: #D2E1FD;\n  --blue-200: #A6C4FB;\n  --blue-300: #79A6F9;\n  --blue-400: #4285F4; /* primary */\n  --blue-500: #1A73E8; /* primary pressed / links */\n  --blue-600: #1666CE;\n  --blue-700: #1257AE;\n  --blue-800: #0E4488;\n\n  /* ---- Purple ramp (gradient mid) ---- */\n  --purple-100: #ECE3F7;\n  --purple-300: #C4A8E4;\n  --purple-500: #9168C0;\n  --purple-700: #6E47A0;\n\n  /* ---- Pink ramp (gradient end) ---- */\n  --pink-100: #FBE4E7;\n  --pink-300: #EDA6AE;\n  --pink-500: #D96570;\n  --pink-700: #B7414D;\n\n  /* ---- Neutrals: Google \"surface\" family, faintly blue-tinted ---- */\n  --neutral-0:   #FFFFFF;\n  --neutral-25:  #FBFCFE;\n  --neutral-50:  #F8FAFD; /* default app canvas */\n  --neutral-100: #F0F4F9; /* surface container */\n  --neutral-200: #E9EEF6;\n  --neutral-300: #DADCE0; /* hairline border */\n  --neutral-400: #C4C7C5;\n  --neutral-500: #9AA0A6;\n  --neutral-600: #5E5E5E;\n  --neutral-700: #444746; /* secondary text */\n  --neutral-800: #2D2F31;\n  --neutral-900: #1F1F1F; /* primary text / near-black */\n  --neutral-950: #131314; /* dark-theme canvas */\n\n  /* ---- Semantic ---- */\n  --success: #34A853;\n  --success-surface: #E6F4EA;\n  --warning: #EA8600;\n  --warning-surface: #FEF3E0;\n  --error:   #EA4335;\n  --error-surface: #FCE8E6;\n  --info:    #4285F4;\n  --info-surface: #EAF1FE;\n\n  /* ---- Semantic aliases (use these in product UI) ---- */\n  --color-primary:        var(--blue-400);\n  --color-primary-hover:  var(--blue-500);\n  --color-primary-press:  var(--blue-600);\n  --color-on-primary:     #FFFFFF;\n  --color-accent:         var(--purple-500);\n\n  --text-primary:    var(--neutral-900);\n  --text-secondary:  var(--neutral-700);\n  --text-tertiary:   var(--neutral-600);\n  --text-disabled:   var(--neutral-500);\n  --text-on-accent:  #FFFFFF;\n  --text-link:       var(--blue-500);\n\n  --surface-canvas:   var(--neutral-50);\n  --surface-card:     var(--neutral-0);\n  --surface-raised:   var(--neutral-0);\n  --surface-sunken:   var(--neutral-100);\n  --surface-hover:    var(--neutral-100);\n  --surface-active:   var(--neutral-200);\n\n  --border-subtle:   var(--neutral-300);\n  --border-strong:   var(--neutral-400);\n  --border-focus:    var(--blue-400);\n\n  /* ---- Signature gradients ---- */\n  /* The recognizable 3-stop Gemini gradient */\n  --gradient-gemini: linear-gradient(135deg, #4285F4 0%, #9168C0 50%, #D96570 100%); /* @kind other */\n  /* Softer wash for large backgrounds */\n  --gradient-gemini-soft: linear-gradient(135deg, #6BA0F7 0%, #A98BD0 55%, #E08C94 100%); /* @kind other */\n  /* The full spark spectrum — sweep through every hue */\n  --gradient-spark: conic-gradient(from 200deg at 50% 50%,\n      #4285F4, #9168C0, #D96570, #EA4335, #F2C200, #34A853, #1FA885, #4285F4); /* @kind other */\n  /* Text-fill gradient (for gradient headlines) */\n  --gradient-text: linear-gradient(90deg, #4285F4 0%, #9168C0 45%, #D96570 100%);\n}\n\n/* ============================================================\n   GEMINI COLOR SYSTEM — typography.css\n   ============================================================ */\n:root {\n  /* Families */\n  --font-display: 'Manrope', 'Google Sans', system-ui, -apple-system, sans-serif;\n  --font-body:    'Manrope', 'Google Sans Text', system-ui, -apple-system, sans-serif;\n  --font-mono:    'Roboto Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* Type scale (display → caption) */\n  --text-display-lg: 57px;\n  --text-display-md: 45px;\n  --text-display-sm: 36px;\n  --text-headline:   28px;\n  --text-title-lg:   22px;\n  --text-title:      18px;\n  --text-body-lg:    16px;\n  --text-body:       14px;\n  --text-label:      13px;\n  --text-caption:    12px;\n\n  /* Weights */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-extra:    800;\n\n  /* Line heights */\n  --leading-tight:   1.12;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* Letter spacing */\n  --tracking-tight:  -0.02em;\n  --tracking-snug:   -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.02em;\n}\n\n/* ============================================================\n   GEMINI COLOR SYSTEM — spacing.css\n   4px base grid, radii, and the Material-derived pill radius.\n   ============================================================ */\n:root {\n  /* Spacing scale (4px base) */\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* Radii — Gemini/Material lean soft & round */\n  --radius-xs:   4px;\n  --radius-sm:   8px;\n  --radius-md:   12px;\n  --radius-lg:   16px;\n  --radius-xl:   24px;\n  --radius-2xl:  28px;\n  --radius-pill: 999px;\n  --radius-full: 50%;\n\n  /* Container widths */\n  --width-prose:    680px;\n  --width-content:  1080px;\n  --width-wide:     1280px;\n}\n\n/* ============================================================\n   GEMINI COLOR SYSTEM — elevation.css\n   Soft, low-contrast Material shadows + brand-tinted focus ring.\n   ============================================================ */\n:root {\n  --shadow-xs: 0 1px 2px rgba(31,31,31,0.06);\n  --shadow-sm: 0 1px 3px rgba(31,31,31,0.08), 0 1px 2px rgba(31,31,31,0.06);\n  --shadow-md: 0 2px 6px rgba(31,31,31,0.08), 0 1px 2px rgba(31,31,31,0.06);\n  --shadow-lg: 0 8px 24px rgba(31,31,31,0.12), 0 2px 6px rgba(31,31,31,0.06);\n  --shadow-xl: 0 16px 40px rgba(31,31,31,0.16), 0 4px 10px rgba(31,31,31,0.08);\n\n  /* Brand-tinted glow — for the gradient/AI surfaces */\n  --shadow-brand: 0 8px 28px rgba(66,133,244,0.22);\n\n  /* Focus ring */\n  --focus-ring: 0 0 0 3px rgba(66,133,244,0.35);\n  --focus-ring-tight: 0 0 0 2px rgba(66,133,244,0.45);\n}\n\n<\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"deck-stage\" from=\"7d049684-78e0-47dc-b81b-3ce25cf0953a#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n<section data-label=\"スタイルシート\" data-speaker-notes=\"このデザインシステムの全体像。カラー・パーツ・タイポグラフィ・レイアウト・Do/Don'tを1枚に集約。\">\n<div style=\"width:1920px;height:1080px;background:#F8FAFD;font-family:'Manrope',system-ui,sans-serif;color:#1F1F1F;display:flex;flex-direction:column;padding:44px 60px 52px;box-sizing:border-box;position:relative;overflow:hidden;\">\n\n  <div style=\"position:absolute;top:-180px;right:-120px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(145,104,192,0.12),transparent 65%);pointer-events:none;\"><\u002Fdiv>\n  <div style=\"position:absolute;bottom:-220px;left:180px;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(66,133,244,0.08),transparent 65%);pointer-events:none;\"><\u002Fdiv>\n\n  <!-- HEADER -->\n  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;position:relative;z-index:1;\">\n    <div style=\"display:flex;a
