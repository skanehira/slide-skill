<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-bar-chart-full</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .placeholder-box { background: #F0F0F0; border: 1px dashed #CCCCCC; display: flex; align-items: center; justify-content: center; color: #AAAAAA; font-size: 13px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; padding: 20px 32px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .annotation-row { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .chart-area { flex: 1; display: flex; flex-direction: column; position: relative; }
  .kpi-badge { position: absolute; top: 4px; right: 0; background: #F0F0F0; border: 1px dashed #CCCCCC; padding: 8px 14px; text-align: right; }
  .kpi-value { font-size: 26px; font-weight: bold; color: #333; }
  .kpi-sub { font-size: 12px; color: #999; margin-top: 2px; }
  .bars-area { flex: 1; display: flex; align-items: flex-end; gap: 6px; padding: 0 10px 28px 10px; border-bottom: 2px solid #CCCCCC; border-left: 1px solid #CCCCCC; }
  .bar-group { flex: 1; display: flex; align-items: flex-end; justify-content: center; }
  .bar { width: 18px; background: #E0E0E0; position: relative; }
  .bar.highlight { background: #C0C0C0; }
  .bar-label { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #666; white-space: nowrap; }
  .xaxis-labels { display: flex; gap: 6px; padding: 4px 10px 0; }
  .xaxis-group { flex: 1; text-align: center; font-size: 9px; color: #999; }
</style>
</head>
<body>
<p class="slide-label">[bar-chart-full]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="annotation-row">
      <div class="area-label" style="margin-bottom:0;">単位・凡例エリア</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C0C0C0;"></div>系列A</div>
      <div class="legend-item"><div class="legend-dot" style="background:#999;"></div>系列B（折れ線）</div>
    </div>
    <div class="chart-area">
      <div class="kpi-badge">
        <div class="area-label" style="margin-bottom:2px;">KPI Badge</div>
        <div class="kpi-value">51,899</div>
        <div class="kpi-sub">YoY +19.4%</div>
      </div>
      <div class="bars-area">
        <div class="bar-group"><div class="bar" style="height:28%;"><span class="bar-label">6,000</span></div></div>
        <div class="bar-group"><div class="bar" style="height:32%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:36%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:40%"><span class="bar-label">17,675</span></div></div>
        <div class="bar-group"><div class="bar" style="height:42%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:46%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:50%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:54%;"><span class="bar-label">23,252</span></div></div>
        <div class="bar-group"><div class="bar" style="height:56%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:60%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:64%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:68%;"><span class="bar-label">34,139</span></div></div>
        <div class="bar-group"><div class="bar" style="height:72%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:76%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:80%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:84%;"><span class="bar-label">43,468</span></div></div>
        <div class="bar-group"><div class="bar" style="height:86%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:90%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:94%;"></div></div>
        <div class="bar-group"><div class="bar highlight" style="height:100%;"><span class="bar-label">51,899</span></div></div>
      </div>
      <div class="xaxis-labels">
        <div class="xaxis-group">2022年</div>
        <div class="xaxis-group">2023年</div>
        <div class="xaxis-group">2024年</div>
        <div class="xaxis-group">2025年</div>
        <div class="xaxis-group">2026年</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
