<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-section-divider</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; }
  /* タイトルエリア */
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  /* コンテンツエリア */
  .content-area { flex: 1; display: flex; align-items: center; justify-content: flex-start; padding: 0 80px; position: relative; }
  /* 左縦線アクセント */
  .left-accent { width: 4px; height: 120px; background: #CCCCCC; flex-shrink: 0; margin-right: 40px; }
  /* メインコンテンツ */
  .main-content { display: flex; flex-direction: column; gap: 10px; }
  .section-number { font-size: 48px; font-weight: bold; color: #AAAAAA; line-height: 1; letter-spacing: 0.05em; }
  .section-title { font-size: 32px; font-weight: bold; color: #333; line-height: 1.2; }
  .section-subtitle { font-size: 15px; color: #666; line-height: 1.5; margin-top: 4px; }
  /* 下部ページ範囲 */
  .footer-optional { position: absolute; bottom: 24px; right: 80px; font-size: 11px; color: #AAAAAA; }
</style>
</head>
<body>
<p class="slide-label">[section-divider]</p>
<div class="slide">
  <!-- タイトルエリア -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <!-- 左縦線アクセント -->
    <div class="left-accent"></div>
    <!-- セクション番号・タイトル・サブタイトル -->
    <div class="main-content">
      <div class="area-label" style="margin-bottom: 2px;">Section Number</div>
      <div class="section-number">02</div>
      <div class="area-label" style="margin-top: 4px; margin-bottom: 2px;">Section Title</div>
      <div class="section-title">セクションタイトルが入ります</div>
      <div class="area-label" style="margin-top: 4px; margin-bottom: 2px;">Sub Title</div>
      <div class="section-subtitle">このセクションの内容を補足するサブタイトルが入ります</div>
    </div>
    <!-- 下部ページ範囲テキスト（任意） -->
    <div class="footer-optional">P.10 – 15（オプション）</div>
  </div>
</div>
</body>
</html>
