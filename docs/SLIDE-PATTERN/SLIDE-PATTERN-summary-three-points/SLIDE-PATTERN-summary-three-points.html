<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-summary-three-points</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #E8E8E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }
    .slide-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed #CCCCCC;
      flex-shrink: 0;
      background: #FAFAFA;
    }
    .area-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px 80px;
      gap: 16px;
      flex: 1;
    }
    .summary-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    /* ポイントアイテム */
    .point-item {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 14px 0;
      border-bottom: 1px solid #F0F0F0;
    }
    .check-icon {
      width: 28px;
      height: 28px;
      border: 2px solid #CCCCCC;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #888;
      flex-shrink: 0;
    }
    .point-text {
      flex: 1;
    }
    .point-heading {
      font-size: 15px;
      font-weight: bold;
      color: #333;
      line-height: 1.4;
    }
    .point-body {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <p class="slide-label">[summary-three-points]</p>
  <div class="slide">
    <!-- タイトルエリア -->
    <div class="title-area">
      <div class="area-label">Title Area — SLIDE.md 参照</div>
      <div class="title-placeholder">スライドタイトルが入ります</div>
    </div>

    <!-- コンテンツエリア -->
    <div class="content-area">
      <div class="summary-label">Summary</div>

      <!-- ポイント 1 -->
      <div class="point-item">
        <div class="check-icon">✓</div>
        <div class="point-text">
          <div class="point-heading">顧客体験の向上が売上増加の最大要因</div>
          <div class="point-body">NPS改善により既存顧客の継続率が前年比+8%向上し、売上にも直結した</div>
        </div>
      </div>

      <!-- ポイント 2 -->
      <div class="point-item">
        <div class="check-icon">✓</div>
        <div class="point-text">
          <div class="point-heading">デジタル化により業務効率が大幅に改善</div>
          <div class="point-body">手作業の80%をシステムに移行し、1人あたりの処理件数が2.3倍に増加した</div>
        </div>
      </div>

      <!-- ポイント 3 -->
      <div class="point-item">
        <div class="check-icon">✓</div>
        <div class="point-text">
          <div class="point-heading">次四半期は新市場開拓を最優先課題とする</div>
          <div class="point-body">東南アジア3カ国での展開準備を進め、来期Q1中のローンチを目指す</div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
