<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-icon-left-text-list</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; padding: 16px 60px; display: flex; flex-direction: column; justify-content: space-around; }
  .list-row { display: flex; align-items: center; gap: 24px; padding: 14px 0; border-bottom: 1px solid #F0F0F0; }
  .list-row:last-child { border-bottom: none; }
  .icon-box { width: 70px; height: 70px; background: #F0F0F0; border: 1px dashed #CCCCCC; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #AAAAAA; flex-shrink: 0; }
  .text-area { flex: 1; }
  .row-heading { font-size: 16px; font-weight: bold; color: #555; margin-bottom: 6px; }
  .row-body { font-size: 13px; color: #666; line-height: 1.7; }
</style>
</head>
<body>
<p class="slide-label">[icon-left-text-list]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="list-row">
      <div class="area-label" style="position:absolute; display:none;">アイコン</div>
      <div class="icon-box">★</div>
      <div class="text-area">
        <div class="area-label">見出し</div>
        <div class="row-heading">見出し1が入ります</div>
        <div class="row-body">本文テキストが入ります。この項目の詳細説明を2〜3行程度で記述します。具体的な内容や数値を入れると効果的です。</div>
      </div>
    </div>
    <div class="list-row">
      <div class="icon-box">◆</div>
      <div class="text-area">
        <div class="area-label">見出し</div>
        <div class="row-heading">見出し2が入ります</div>
        <div class="row-body">本文テキストが入ります。この項目の詳細説明を2〜3行程度で記述します。具体的な内容や数値を入れると効果的です。</div>
      </div>
    </div>
    <div class="list-row">
      <div class="icon-box">●</div>
      <div class="text-area">
        <div class="area-label">見出し</div>
        <div class="row-heading">見出し3が入ります</div>
        <div class="row-body">本文テキストが入ります。この項目の詳細説明を2〜3行程度で記述します。具体的な内容や数値を入れると効果的です。</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
