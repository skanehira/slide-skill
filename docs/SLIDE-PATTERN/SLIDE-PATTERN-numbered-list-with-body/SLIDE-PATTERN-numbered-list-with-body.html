<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-numbered-list-with-body</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; padding: 16px 48px; display: flex; flex-direction: column; justify-content: space-around; }
  .list-item { display: flex; align-items: flex-start; gap: 20px; padding-bottom: 16px; border-bottom: 1px solid #EEEEEE; }
  .list-item:last-child { border-bottom: none; padding-bottom: 0; }
  .badge { width: 48px; height: 48px; border-radius: 50%; background: #E0E0E0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; color: #666; flex-shrink: 0; }
  .item-content { flex: 1; }
  .item-heading { font-size: 17px; font-weight: bold; color: #333; margin-bottom: 6px; }
  .item-body { font-size: 13px; color: #666; line-height: 1.6; }
</style>
</head>
<body>
<p class="slide-label">[numbered-list-with-body]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="list-item">
      <div class="badge">01</div>
      <div class="item-content">
        <div class="area-label">項目見出し</div>
        <div class="item-heading">見出しが入ります</div>
        <div class="item-body">本文テキストが入ります。項目の詳細説明を2〜3行程度で記述します。具体的な内容や背景を補足します。</div>
      </div>
    </div>
    <div class="list-item">
      <div class="badge">02</div>
      <div class="item-content">
        <div class="area-label">項目見出し</div>
        <div class="item-heading">見出しが入ります</div>
        <div class="item-body">本文テキストが入ります。項目の詳細説明を2〜3行程度で記述します。具体的な内容や背景を補足します。</div>
      </div>
    </div>
    <div class="list-item">
      <div class="badge">03</div>
      <div class="item-content">
        <div class="area-label">項目見出し</div>
        <div class="item-heading">見出しが入ります</div>
        <div class="item-body">本文テキストが入ります。項目の詳細説明を2〜3行程度で記述します。具体的な内容や背景を補足します。</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
