<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-three-column-icon-card</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; padding: 20px 32px; display: flex; gap: 16px; }
  .card { flex: 1; border: 1px solid #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 20px 20px 16px; }
  .icon-area { width: 70px; height: 70px; background: #F0F0F0; border: 1px dashed #CCCCCC; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #AAAAAA; margin-bottom: 14px; flex-shrink: 0; }
  .card-heading { font-size: 15px; font-weight: bold; color: #333; text-align: center; margin-bottom: 10px; line-height: 1.3; }
  .divider { width: 40px; height: 2px; background: #E0E0E0; margin-bottom: 10px; }
  .card-body { font-size: 12px; color: #666; line-height: 1.7; text-align: left; }
  .bullet { margin-bottom: 4px; }
  .bullet::before { content: "▶ "; color: #CCCCCC; font-size: 10px; }
</style>
</head>
<body>
<p class="slide-label">[three-column-icon-card]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="card">
      <div class="area-label" style="align-self:flex-start;">アイコン</div>
      <div class="icon-area">★</div>
      <div class="card-heading">見出し1が入ります</div>
      <div class="divider"></div>
      <div class="card-body">
        <div class="bullet">ポイント1：詳細説明が入ります</div>
        <div class="bullet">ポイント2：詳細説明が入ります</div>
        <div class="bullet">ポイント3：詳細説明が入ります</div>
      </div>
    </div>
    <div class="card">
      <div class="area-label" style="align-self:flex-start;">アイコン</div>
      <div class="icon-area">◆</div>
      <div class="card-heading">見出し2が入ります</div>
      <div class="divider"></div>
      <div class="card-body">
        <div class="bullet">ポイント1：詳細説明が入ります</div>
        <div class="bullet">ポイント2：詳細説明が入ります</div>
        <div class="bullet">ポイント3：詳細説明が入ります</div>
      </div>
    </div>
    <div class="card">
      <div class="area-label" style="align-self:flex-start;">アイコン</div>
      <div class="icon-area">●</div>
      <div class="card-heading">見出し3が入ります</div>
      <div class="divider"></div>
      <div class="card-body">
        <div class="bullet">ポイント1：詳細説明が入ります</div>
        <div class="bullet">ポイント2：詳細説明が入ります</div>
        <div class="bullet">ポイント3：詳細説明が入ります</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
