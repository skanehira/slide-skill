<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-numbered-toc</title>
  <style>
    body {
      background: #E8E8E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      font-family: sans-serif;
      margin: 0;
    }
    .slide-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      overflow: hidden;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
    }
    .area-label {
      font-size: 11px;
      color: #999999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .toc-row {
      display: flex;
      align-items: baseline;
      padding: 9px 0;
      font-size: 16px;
      color: #333333;
    }
    .toc-number {
      width: 32px;
      flex-shrink: 0;
      font-weight: bold;
      color: #555555;
    }
    .toc-name {
      flex-shrink: 0;
      color: #333333;
    }
    .toc-dots {
      flex: 1;
      border-bottom: 2px dotted #CCCCCC;
      margin: 0 12px;
      margin-bottom: 3px;
    }
    .toc-page {
      flex-shrink: 0;
      color: #777777;
      font-size: 15px;
    }
  </style>
</head>
<body>

<p class="slide-label">[numbered-toc]</p>
<div class="slide">

  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div style="padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA;">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size: 16px; color: #CCCCCC; margin-top: 4px;">スライドタイトルが入ります</div>
  </div>

  <!-- コンテンツエリア（このパターンが定義する領域） -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 24px 80px;">
    <div class="area-label">Numbered TOC List</div>

    <div class="toc-row">
      <span class="toc-number">1.</span>
      <span class="toc-name">項目名が入ります</span>
      <span class="toc-dots"></span>
      <span class="toc-page">3</span>
    </div>
    <div class="toc-row">
      <span class="toc-number">2.</span>
      <span class="toc-name">項目名が入ります</span>
      <span class="toc-dots"></span>
      <span class="toc-page">4</span>
    </div>
    <div class="toc-row">
      <span class="toc-number">3.</span>
      <span class="toc-name">項目名が入ります</span>
      <span class="toc-dots"></span>
      <span class="toc-page">6</span>
    </div>
    <div class="toc-row">
      <span class="toc-number">4.</span>
      <span class="toc-name">項目名が入ります</span>
      <span class="toc-dots"></span>
      <span class="toc-page">8</span>
    </div>
    <div class="toc-row">
      <span class="toc-number">5.</span>
      <span class="toc-name">項目名が入ります（長い項目名の場合はここまで）</span>
      <span class="toc-dots"></span>
      <span class="toc-page">10</span>
    </div>
    <div class="toc-row">
      <span class="toc-number">6.</span>
      <span class="toc-name">項目名が入ります</span>
      <span class="toc-dots"></span>
      <span class="toc-page">14</span>
    </div>

  </div>
</div>

</body>
</html>
