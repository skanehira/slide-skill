<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-four-card-2x2</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; padding: 16px 32px 20px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; }
  .card { border: 1px solid #E0E0E0; display: flex; flex-direction: column; overflow: hidden; }
  .card-header { background: #E8E8E8; padding: 8px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #D8D8D8; }
  .card-num { font-size: 18px; font-weight: bold; color: #888; }
  .card-heading { font-size: 14px; font-weight: bold; color: #333; }
  .card-body { flex: 1; padding: 10px 16px; font-size: 12px; color: #555; line-height: 1.7; }
</style>
</head>
<body>
<p class="slide-label">[four-card-2x2]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア：2×2グリッド -->
  <div class="content-area">
    <div class="card">
      <div class="card-header">
        <div class="card-num">01</div>
        <div class="card-heading">見出し1が入ります</div>
      </div>
      <div class="card-body">本文テキストが入ります。各カードの詳細説明を2〜4行程度で記述します。</div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-num">02</div>
        <div class="card-heading">見出し2が入ります</div>
      </div>
      <div class="card-body">本文テキストが入ります。各カードの詳細説明を2〜4行程度で記述します。</div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-num">03</div>
        <div class="card-heading">見出し3が入ります</div>
      </div>
      <div class="card-body">本文テキストが入ります。各カードの詳細説明を2〜4行程度で記述します。</div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-num">04</div>
        <div class="card-heading">見出し4が入ります</div>
      </div>
      <div class="card-body">本文テキストが入ります。各カードの詳細説明を2〜4行程度で記述します。</div>
    </div>
  </div>
</div>
</body>
</html>
