<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-status-progress-table</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed #CCCCCC; flex-shrink: 0; background: #FAFAFA; }
  .content-area { flex: 1; padding: 16px 40px; display: flex; flex-direction: column; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 12px; padding: 8px 16px; text-align: left; border-bottom: 2px solid #DDDDDD; color: #555; font-weight: bold; }
  td { font-size: 13px; padding: 10px 16px; border-bottom: 1px solid #EEEEEE; color: #333; vertical-align: middle; }
  td.item-name { font-weight: bold; }
  .status-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: bold; }
  .status-icon { font-size: 14px; }
  .status-done { color: #666; }
  .status-progress { color: #888; }
  .status-delayed { color: #999; background: #FFF8F0; }
  tr.delayed { background: #FAFAFA; }
</style>
</head>
<body>
<p class="slide-label">[status-progress-table]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="title-area">
    <div class="area-label">Title Area — SLIDE.md 参照</div>
    <div style="font-size:16px; color:#CCCCCC; margin-top:4px;">スライドタイトルが入ります</div>
  </div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="area-label">進捗ステータス表</div>
    <table>
      <thead>
        <tr>
          <th style="width:40%;">プロジェクト名 / 施策名</th>
          <th style="width:25%;">ステータス</th>
          <th>完了日 / 状況</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="item-name">❶ 施策名Aが入ります</td>
          <td><span class="status-badge status-done"><span class="status-icon">✓</span> 完了</span></td>
          <td>1/10</td>
        </tr>
        <tr>
          <td class="item-name">❷ 施策名Bが入ります</td>
          <td><span class="status-badge status-done"><span class="status-icon">✓</span> 完了</span></td>
          <td>1/15</td>
        </tr>
        <tr>
          <td class="item-name">❸ 施策名Cが入ります</td>
          <td><span class="status-badge status-done"><span class="status-icon">✓</span> 完了</span></td>
          <td>1/25</td>
        </tr>
        <tr>
          <td class="item-name">❹ 施策名Dが入ります</td>
          <td><span class="status-badge status-progress"><span class="status-icon">○</span> 進行中</span></td>
          <td>2/5予定</td>
        </tr>
        <tr class="delayed">
          <td class="item-name">❺ 施策名Eが入ります</td>
          <td><span class="status-badge status-delayed"><span class="status-icon">△</span> 遅延</span></td>
          <td>レビュー待ち（要確認）</td>
        </tr>
        <tr class="delayed">
          <td class="item-name">❻ 施策名Fが入ります</td>
          <td><span class="status-badge status-delayed"><span class="status-icon">△</span> 遅延</span></td>
          <td>データ不一致により保留</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
