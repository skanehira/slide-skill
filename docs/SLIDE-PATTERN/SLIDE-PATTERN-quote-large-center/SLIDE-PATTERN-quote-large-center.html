<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-quote-large-center</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #E8E8E8;
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .slide-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed #CCCCCC;
      flex-shrink: 0;
      background: #FAFAFA;
    }
    .area-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 80px;
      gap: 16px;
    }
    .quote-mark-open {
      font-size: 64px;
      color: #DDDDDD;
      line-height: 0.8;
      align-self: flex-start;
      font-family: Georgia, serif;
    }
    .quote-text {
      font-size: 18px;
      color: #333;
      text-align: center;
      line-height: 1.8;
      font-style: italic;
    }
    .quote-divider {
      width: 60px;
      height: 1px;
      background: #CCCCCC;
      flex-shrink: 0;
    }
    .attribution {
      font-size: 13px;
      color: #888;
      text-align: center;
    }
    .quote-mark-close {
      font-size: 64px;
      color: #DDDDDD;
      line-height: 0.8;
      align-self: flex-end;
      font-family: Georgia, serif;
    }
  </style>
</head>
<body>
  <p class="slide-label">[quote-large-center]</p>
  <div class="slide">

    <!-- タイトルエリア -->
    <div class="title-area">
      <div class="area-label">Title Area — SLIDE.md 参照</div>
      <div class="title-placeholder">スライドタイトルが入ります</div>
    </div>

    <!-- コンテンツエリア -->
    <div class="content-area">

      <!-- 開き引用符 -->
      <div class="quote-mark-open">&ldquo;</div>

      <!-- 引用テキスト -->
      <p class="quote-text">
        顧客が本当に求めているのは、製品そのものではなく<br>
        その製品がもたらす「体験」と「感情」である。<br>
        すべての意思決定はそこから始まる。
      </p>

      <!-- 区切り線 -->
      <div class="quote-divider"></div>

      <!-- 引用元 -->
      <p class="attribution">— マーケティング白書 2024</p>

      <!-- 閉じ引用符 -->
      <div class="quote-mark-close">&rdquo;</div>

    </div>
  </div>
</body>
</html>
