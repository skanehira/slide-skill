<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-cover-title-center</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  /* 装飾背景 */
  .deco-top-right { position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; background: #EEEEEE; }
  .deco-bottom-left { position: absolute; bottom: -80px; left: -80px; width: 360px; height: 360px; border-radius: 50%; background: #F0F0F0; }
  .deco-small { position: absolute; top: 40px; left: 60px; width: 80px; height: 80px; border-radius: 50%; background: #E8E8E8; }
  /* 中央コンテンツ */
  .center-content { position: relative; z-index: 1; text-align: center; padding: 40px 80px; }
  .main-title { font-size: 40px; font-weight: bold; color: #333; margin-bottom: 16px; line-height: 1.2; }
  .sub-title { font-size: 18px; color: #777; line-height: 1.5; }
  .area-label-overlay { position: absolute; top: 16px; left: 16px; font-size: 11px; color: #AAAAAA; text-transform: uppercase; }
</style>
</head>
<body>
<p class="slide-label">[cover-title-center]</p>
<div class="slide">
  <div class="deco-top-right"></div>
  <div class="deco-bottom-left"></div>
  <div class="deco-small"></div>
  <div class="area-label-overlay">Cover Slide — タイトルエリアなし（または専用デザイン）</div>
  <!-- 中央コンテンツ -->
  <div class="center-content">
    <div class="area-label" style="color:#CCCCCC;">メインタイトル</div>
    <div class="main-title">メインタイトルが入ります</div>
    <div style="width: 60px; height: 2px; background: #CCCCCC; margin: 0 auto 16px;"></div>
    <div class="area-label" style="color:#CCCCCC;">サブタイトル</div>
    <div class="sub-title">—サブタイトルまたはキャッチコピーが入ります—</div>
  </div>
</div>
</body>
</html>
