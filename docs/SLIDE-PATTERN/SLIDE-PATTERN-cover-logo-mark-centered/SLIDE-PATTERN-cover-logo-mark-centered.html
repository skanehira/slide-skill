<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-logo-mark-centered</title>
  <style>
    body {
      background: #E8E8E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      margin: 0;
      font-family: sans-serif;
    }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .title-area {
      flex-shrink: 0;
      background: #FAFAFA;
      padding: 10px 40px;
      border-bottom: 1px dashed #CCCCCC;
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .pattern-label {
      margin-top: 16px;
      font-size: 12px;
      color: #888;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="title-area">Title Area — SLIDE.md 参照</div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:30px 60px;">
      <div style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:0.08em;">Logo Mark</div>
      <div style="width:72px; height:72px; background:#F0F0F0; border:1px dashed #CCCCCC; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; color:#AAAAAA;">MARK</div>
      <div style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:0.08em; margin-top:4px;">Main Title</div>
      <div style="font-size:30px; font-weight:bold; color:#333; text-align:center;">資料タイトルが入ります</div>
      <div style="width:40px; height:2px; background:#CCCCCC;"></div>
      <div style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:0.08em;">Company / Date / Info</div>
      <div style="font-size:16px; font-weight:600; color:#555; text-align:center;">株式会社〇〇〇〇</div>
      <div style="font-size:13px; color:#777;">2025年X月</div>
      <div style="font-size:12px; color:#999;">東証XX市場（証券コード：XXXX）</div>
    </div>
  </div>
  <div class="pattern-label">SLIDE-PATTERN: cover-logo-mark-centered</div>
</body>
</html>
