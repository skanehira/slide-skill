<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLIDE-PATTERN ギャラリー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F0F0F0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #333;
  }
  .header {
    background: #1A1A2E;
    color: #FFF;
    padding: 28px 40px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.04em; }
  .header p { font-size: 13px; color: #AAA; margin-top: 4px; }
  .header-meta { font-size: 12px; color: #888; margin-top: 6px; }
  .toc-nav {
    background: #FFFFFF;
    border-bottom: 1px solid #E0E0E0;
    padding: 12px 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .toc-nav a {
    font-size: 12px;
    color: #555;
    text-decoration: none;
    background: #F5F5F5;
    border: 1px solid #E0E0E0;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .toc-nav a:hover { background: #E8E8E8; color: #222; }
  .main { padding: 32px 40px 60px; }
  .category-section { margin-bottom: 48px; }
  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #333;
  }
  .category-icon { font-size: 20px; }
  .category-title { font-size: 18px; font-weight: 700; color: #1A1A2E; }
  .category-count {
    font-size: 12px;
    color: #999;
    background: #EEEEEE;
    padding: 2px 10px;
    border-radius: 10px;
  }
  .pattern-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }
  .pattern-card {
    background: #FFFFFF;
    border: 1px solid #DDDDDD;
    border-radius: 6px;
    overflow: hidden;
    transition: box-shadow 0.15s, transform 0.15s;
    cursor: pointer;
  }
  .pattern-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    transform: translateY(-2px);
  }
  .slide-preview {
    width: 320px;
    height: 180px;
    overflow: hidden;
    position: relative;
    background: #FAFAFA;
  }
  .slide-preview iframe {
    width: 960px;
    height: 540px;
    border: none;
    transform: scale(0.3333);
    transform-origin: top left;
    pointer-events: none;
  }
  .card-footer {
    padding: 10px 14px 12px;
    border-top: 1px solid #F0F0F0;
    background: #FDFDFD;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pattern-name {
    font-size: 12px;
    font-weight: 600;
    color: #333;
    font-family: "SF Mono", "Fira Code", monospace;
    word-break: break-all;
  }

  /* ===== オーバーレイ ===== */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .overlay.active { display: flex; }
  .overlay-inner {
    background: #1A1A2E;
    border-radius: 8px;
    overflow: hidden;
    max-width: 1040px;
    width: 95vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
  }
  .overlay-header {
    background: #1A1A2E;
    color: #FFF;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .overlay-header h3 {
    font-size: 13px;
    font-family: "SF Mono", "Fira Code", monospace;
    color: #CCC;
  }
  .overlay-close {
    background: none;
    border: none;
    color: #FFF;
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
  }

  /* タブバー */
  .tab-bar {
    display: flex;
    gap: 0;
    background: #111122;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    color: #888;
    font-size: 13px;
    padding: 10px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  .tab-btn:hover { color: #CCC; }
  .tab-btn.active { color: #FFF; border-bottom-color: #7B9CFF; }

  /* タブパネル */
  .tab-panel { display: none; flex-direction: column; overflow: hidden; }
  .tab-panel.active { display: flex; }

  /* プレビュータブ */
  #tab-preview {
    background: #E8E8E8;
    padding: 20px;
    align-items: center;
    justify-content: center;
  }
  .overlay-iframe-wrap {
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .overlay-iframe-wrap iframe {
    width: 960px;
    height: 540px;
    border: none;
    display: block;
    transform-origin: top left;
  }

  /* マークダウンタブ */
  #tab-markdown {
    background: #0D1117;
    overflow: hidden;
  }
  .md-toolbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 8px 16px;
    background: #161B22;
    border-bottom: 1px solid #30363D;
    flex-shrink: 0;
    gap: 12px;
  }
  .md-toolbar-label {
    font-size: 12px;
    color: #8B949E;
    font-family: "SF Mono", "Fira Code", monospace;
  }
  .copy-btn {
    background: #21262D;
    color: #C9D1D9;
    border: 1px solid #30363D;
    border-radius: 6px;
    font-size: 12px;
    padding: 5px 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  .copy-btn:hover { background: #30363D; border-color: #6E7681; }
  .copy-btn.copied { background: #238636; border-color: #2EA043; color: #FFF; }
  .md-content-wrap {
    overflow-y: auto;
    flex: 1;
    max-height: 60vh;
  }
  #overlay-md-content {
    padding: 20px 24px;
    font-family: "SF Mono", "Fira Code", "Courier New", monospace;
    font-size: 12px;
    line-height: 1.7;
    color: #C9D1D9;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #overlay-md-loading {
    padding: 40px;
    color: #8B949E;
    font-size: 13px;
    text-align: center;
  }

  /* ===== デザインシステムセクション ===== */
  .ds-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
    gap: 20px;
  }
  .ds-card {
    background: #FFF;
    border: 1px solid #DDDDDD;
    border-radius: 6px;
    overflow: hidden;
    transition: box-shadow 0.15s, transform 0.15s;
    cursor: pointer;
  }
  .ds-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    transform: translateY(-2px);
  }
  .ds-preview {
    width: 100%;
    height: 180px;
    overflow: hidden;
    position: relative;
    background: #FAFAFA;
  }
  .ds-preview iframe {
    width: 960px;
    height: 540px;
    border: none;
    transform: scale(0.3333);
    transform-origin: top left;
    pointer-events: none;
  }
  .ds-card-footer {
    padding: 10px 14px 12px;
    border-top: 1px solid #F0F0F0;
    background: #FDFDFD;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ds-name {
    font-size: 12px;
    font-weight: 600;
    color: #333;
    font-family: "SF Mono", "Fira Code", monospace;
  }
  .ds-badge {
    font-size: 10px;
    color: #888;
    background: #F0F0F0;
    border: 1px solid #E0E0E0;
    border-radius: 10px;
    padding: 2px 8px;
  }

  /* ===== 選択機能 ===== */
  .select-btn {
    background: #F5F5F5;
    border: 1px solid #DDD;
    border-radius: 4px;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    color: #555;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .select-btn:hover { background: #E0E0E0; color: #222; }
  .pattern-card.selected { border: 2px solid #7B9CFF; }
  .ds-card.selected { border: 2px solid #7B9CFF; }
  .pattern-card.selected .select-btn,
  .ds-card.selected .select-btn {
    background: #1A1A2E;
    border-color: #1A1A2E;
    color: #FFF;
  }
  .select-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 22px;
    height: 22px;
    background: #7B9CFF;
    color: #FFF;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }

  /* エクスポートバー */
  #export-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1A1A2E;
    color: #FFF;
    padding: 14px 24px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 200;
    box-shadow: 0 -3px 12px rgba(0,0,0,0.4);
  }
  #export-bar.active { display: flex; }
  #export-bar-label { font-size: 14px; color: #CCC; }
  .export-bar-btns { display: flex; gap: 10px; align-items: center; }
  .export-btn {
    background: #7B9CFF;
    color: #FFF;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    padding: 9px 22px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.15s;
  }
  .export-btn:hover { background: #5A7AFF; }
  .export-btn:disabled { background: #555; cursor: default; }
  .reset-btn {
    background: transparent;
    color: #888;
    border: 1px solid #555;
    border-radius: 6px;
    font-size: 13px;
    padding: 8px 16px;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { color: #CCC; border-color: #888; }

  /* デザインシステムオーバーレイのプレビュー */
  .ds-iframe-wrap {
    width: 100%;
    height: 580px;
    position: relative;
    overflow: hidden;
  }
  .ds-iframe-wrap iframe {
    width: 960px;
    height: 580px;
    border: none;
    display: block;
    transform-origin: top left;
  }

  @media (max-width: 800px) {
    .toc-nav { padding: 10px 16px; }
    .main { padding: 20px 16px 40px; }
    .pattern-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .ds-grid { grid-template-columns: 1fr; }
  }

  /* スマホ対応 */
  @media (max-width: 600px) {
    .header { padding: 16px; }
    .header h1 { font-size: 18px; }
    .header p { font-size: 13px; }
    .header-meta { font-size: 12px; }
    .toc-nav {
      flex-wrap: nowrap;
      overflow-x: auto;
      padding: 10px 12px;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .toc-nav::-webkit-scrollbar { display: none; }
    .toc-nav a { font-size: 13px; padding: 6px 14px; flex-shrink: 0; }
    .main { padding: 20px 12px 40px; }
    .category-title { font-size: 16px; }
    .category-count { font-size: 13px; }
    .pattern-name { font-size: 14px; }
    .ds-name { font-size: 14px; }
    .ds-badge { font-size: 12px; }
    .card-footer { padding: 12px 14px; }
    .pattern-grid { grid-template-columns: 1fr; gap: 16px; }
    .ds-grid { grid-template-columns: 1fr; gap: 16px; }
    .slide-preview { width: 100%; aspect-ratio: 16/9; height: auto; }
    .slide-preview iframe {
      width: 960px;
      height: 540px;
      transform: scale(calc((100vw - 24px) / 960));
      transform-origin: top left;
    }
    .ds-preview { width: 100%; aspect-ratio: 16/9; height: auto; }
    .ds-preview iframe {
      width: 960px;
      height: 540px;
      transform: scale(calc((100vw - 24px) / 960));
      transform-origin: top left;
    }

    /* オーバーレイをフルスクリーン化 */
    .overlay { align-items: flex-start; }
    .overlay-inner {
      width: 100%;
      max-width: 100%;
      height: 100dvh;
      max-height: 100dvh;
      border-radius: 0;
    }
    .tab-btn { font-size: 12px; padding: 9px 14px; }
    #tab-preview { padding: 10px; }
    .md-content-wrap { max-height: calc(100dvh - 130px); }
    .ds-iframe-wrap { width: 100%; }
    #export-bar { padding: 10px 14px; }
    #export-bar-label { font-size: 13px; }
    .export-btn { font-size: 12px; padding: 8px 16px; }
    .reset-btn { font-size: 12px; padding: 7px 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>SLIDE.md ギャラリー</h1>
  <p>デザインシステムサンプルとスライドレイアウトパターンの一覧 — カードをクリックするとプレビューとファイル内容を確認できます</p>
  <div class="header-meta" id="header-meta"></div>
</div>
<nav class="toc-nav" id="toc-nav"></nav>
<main class="main" id="main"></main>

<!-- 拡大表示オーバーレイ -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="overlay-inner" onclick="event.stopPropagation()">
    <div class="overlay-header">
      <h3 id="overlay-title"></h3>
      <button class="overlay-close" onclick="closeOverlay()">✕</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-btn-preview" onclick="switchTab('preview')">プレビュー</button>
      <button class="tab-btn" id="tab-btn-markdown" onclick="switchTab('markdown')">MDファイル</button>
    </div>
    <!-- プレビュータブ -->
    <div id="tab-preview" class="tab-panel active">
      <div id="overlay-preview-wrap" class="overlay-iframe-wrap">
        <iframe id="overlay-iframe" src="" width="960" height="540"></iframe>
      </div>
    </div>
    <!-- マークダウンタブ -->
    <div id="tab-markdown" class="tab-panel">
      <div class="md-toolbar">
        <span class="md-toolbar-label" id="md-toolbar-label"></span>
        <button class="copy-btn" id="copy-btn" onclick="copyMarkdown()">コピー</button>
      </div>
      <div class="md-content-wrap">
        <div id="overlay-md-loading">読み込み中...</div>
        <pre id="overlay-md-content" style="display:none"></pre>
      </div>
    </div>
  </div>
</div>

<!-- エクスポートバー -->
<div id="export-bar">
  <span id="export-bar-label"></span>
  <div class="export-bar-btns">
    <button class="reset-btn" onclick="resetSelection()">選択をリセット</button>
    <button class="export-btn" onclick="exportSelectedMd()">エクスポート</button>
  </div>
</div>

<script>

// =============================================================

  {

// =============================================================
// 以下はHTML生成ロジック（通常は変更不要）
// =============================================================

let currentMdContent = '';

// ===== 選択機能 =====
let selectedItems = [];

function toggleSelect(e, type, id, mdSrc, label, card) {
  e.stopPropagation();
  const idx = selectedItems.findIndex(item => item.id === id);
  if (idx >= 0) {
    selectedItems.splice(idx, 1);
    card.classList.remove('selected');
  } else {
    selectedItems.push({ type, id, mdSrc, label, card });
    card.classList.add('selected');
  }
  updateBadges();
  updateExportBar();
}

function updateBadges() {
  document.querySelectorAll('.select-badge').forEach(b => {
    b.style.display = 'none';
  });
  selectedItems.forEach((item, i) => {
    const badge = item.card.querySelector('.select-badge');
    if (badge) {
      badge.textContent = i + 1;
      badge.style.display = 'flex';
    }
  });
}

function updateExportBar() {
  const bar = document.getElementById('export-bar');
  if (selectedItems.length > 0) {
    bar.classList.add('active');
    document.getElementById('export-bar-label').textContent =
      `${selectedItems.length} 件選択中`;
  } else {
    bar.classList.remove('active');
  }
}

function resetSelection() {
  selectedItems.forEach(item => {
    item.card.classList.remove('selected');
    const badge = item.card.querySelector('.select-badge');
    if (badge) badge.style.display = 'none';
  });
  selectedItems = [];
  updateExportBar();
}

async function exportSelectedMd() {
  if (selectedItems.length === 0) return;
  const btn = document.querySelector('.export-btn');
  btn.textContent = '準備中...';
  btn.disabled = true;
  try {
    const parts = [];
    for (const item of selectedItems) {
      const res = await fetch(item.mdSrc);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      parts.push(text);
    }
    const combined = parts.join('\n\n---\n\n');
    const blob = new Blob([combined], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'SLIDE-SELECTION.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('ダウンロードに失敗しました。');
  } finally {
    btn.textContent = 'エクスポート';
    btn.disabled = false;
  }
}

function buildDesignSystems() {
  const main = document.getElementById('main');
  const section = document.createElement('section');
  section.className = 'category-section';
  section.id = 'design-systems';
  section.innerHTML = `
    <div class="category-header">
      <span class="category-icon">🎨</span>
      <span class="category-title">デザインシステム サンプル</span>
      <span class="category-count">${DESIGN_SYSTEMS.length} サンプル</span>
    </div>
    <div class="ds-grid"></div>
  `;
  const grid = section.querySelector('.ds-grid');
  DESIGN_SYSTEMS.forEach(ds => {
    const card = document.createElement('div');
    card.className = 'ds-card';
    card.onclick = () => openDSOverlay(ds.name, ds.label);
    card.innerHTML = `
      <div class="ds-preview">
        <iframe src="SLIDE-md/${ds.name}/sample.html" loading="lazy"></iframe>
        <div class="select-badge"></div>
      </div>
      <div class="ds-card-footer">
        <div class="ds-name">${ds.name}</div>
        <button class="select-btn">選択</button>
      </div>
    `;
    card.querySelector('.select-btn').addEventListener('click', e => {
      toggleSelect(e, 'ds', ds.name, `SLIDE-md/${ds.name}/SLIDE.md`, ds.label || ds.name, card);
    });
    grid.appendChild(card);
  });
  main.appendChild(section);
}

function buildGallery() {
  const totalPatterns = CATEGORIES.reduce((sum, c) => sum + c.patterns.length, 0);

  document.getElementById('header-meta').textContent =
    `デザインシステム ${DESIGN_SYSTEMS.length} 件｜パターン ${totalPatterns} 種類（${CATEGORIES.length} カテゴリ）`;

  const nav = document.getElementById('toc-nav');

  // デザインシステムをTOCの先頭に追加
  const dsLink = document.createElement('a');
  dsLink.href = '#design-systems';
  dsLink.textContent = '🎨 デザインシステム';
  nav.appendChild(dsLink);

  CATEGORIES.forEach(cat => {
    const a = document.createElement('a');
    a.href = `#${cat.id}`;
    a.textContent = `${cat.icon} ${cat.title}`;
    nav.appendChild(a);
  });

  // デザインシステムセクションを最初に生成
  buildDesignSystems();

  const main = document.getElementById('main');
  CATEGORIES.forEach(cat => {
    const section = document.createElement('section');
    section.className = 'category-section';
    section.id = cat.id;

    section.innerHTML = `
      <div class="category-header">
        <span class="category-icon">${cat.icon}</span>
        <span class="category-title">${cat.title}</span>
        <span class="category-count">${cat.patterns.length} パターン</span>
      </div>
      <div class="pattern-grid"></div>
    `;

    const grid = section.querySelector('.pattern-grid');

    cat.patterns.forEach(name => {
      const fullName = `SLIDE-PATTERN-${name}`;
      const card = document.createElement('div');
      card.className = 'pattern-card';
      card.onclick = () => openOverlay(fullName);
      card.innerHTML = `
        <div class="slide-preview">
          <iframe src="SLIDE-PATTERN/${fullName}/${fullName}.html" loading="lazy"></iframe>
          <div class="select-badge"></div>
        </div>
        <div class="card-footer">
          <div class="pattern-name">${name}</div>
          <button class="select-btn">選択</button>
        </div>
      `;
      card.querySelector('.select-btn').addEventListener('click', e => {
        toggleSelect(e, 'pattern', fullName, `SLIDE-PATTERN/${fullName}/${fullName}.md`, name, card);
      });
      grid.appendChild(card);
    });

    main.appendChild(section);
  });
}

function fitPreview() {
  const wrap = document.getElementById('overlay-preview-wrap');
  if (!wrap) return;
  const iframe = document.getElementById('overlay-iframe');
  const scale = wrap.clientWidth / 960;
  if (scale >= 1) {
    iframe.style.transform = '';
    return;
  }
  iframe.style.transform = `scale(${scale})`;
  iframe.style.transformOrigin = 'top left';
  const baseH = wrap.className === 'overlay-iframe-wrap' ? 540 : 580;
  wrap.style.height = (baseH * scale) + 'px';
}

window.addEventListener('resize', fitPreview);

function openOverlayCore({ title, htmlSrc, mdSrc, mdLabel, isDS }) {
  const overlay = document.getElementById('overlay');
  const wrap = document.getElementById('overlay-preview-wrap');

  document.getElementById('overlay-title').textContent = title;
  document.getElementById('tab-btn-markdown').textContent = mdLabel;
  document.getElementById('md-toolbar-label').textContent = mdLabel;

  // プレビューラッパーをモードに応じて切り替え
  if (isDS) {
    wrap.className = 'ds-iframe-wrap';
    document.getElementById('overlay-iframe').style.height = '580px';
  } else {
    wrap.className = 'overlay-iframe-wrap';
    document.getElementById('overlay-iframe').style.height = '540px';
  }
  document.getElementById('overlay-iframe').src = htmlSrc;

  // マークダウン読み込みリセット
  currentMdContent = '';
  document.getElementById('overlay-md-content').style.display = 'none';
  document.getElementById('overlay-md-content').textContent = '';
  document.getElementById('overlay-md-loading').style.display = 'block';
  document.getElementById('overlay-md-loading').textContent = '読み込み中...';
  resetCopyBtn();

  switchTab('preview');
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(fitPreview);

  fetch(mdSrc)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.text();
    })
    .then(text => {
      currentMdContent = text;
      document.getElementById('overlay-md-content').textContent = text;
      document.getElementById('overlay-md-content').style.display = 'block';
      document.getElementById('overlay-md-loading').style.display = 'none';
    })
    .catch(() => {
      document.getElementById('overlay-md-loading').textContent = 'ファイルを読み込めませんでした。';
    });
}

function openOverlay(name) {
  openOverlayCore({
    title: name,
    htmlSrc: `SLIDE-PATTERN/${name}/${name}.html`,
    mdSrc:  `SLIDE-PATTERN/${name}/${name}.md`,
    mdLabel: `${name}.md`,
    isDS: false,
  });
}

function openDSOverlay(name, label) {
  openOverlayCore({
    title: label,
    htmlSrc: `SLIDE-md/${name}/sample.html`,
    mdSrc:  `SLIDE-md/${name}/SLIDE.md`,
    mdLabel: 'SLIDE.md',
    isDS: true,
  });
}

function closeOverlay(e) {
  if (e && e.target !== document.getElementById('overlay') &&
      !e.target.classList.contains('overlay-close')) return;
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('overlay-iframe').src = '';
  document.body.style.overflow = '';
  currentMdContent = '';
}

function switchTab(tab) {
  document.getElementById('tab-preview').classList.toggle('active', tab === 'preview');
  document.getElementById('tab-markdown').classList.toggle('active', tab === 'markdown');
  document.getElementById('tab-btn-preview').classList.toggle('active', tab === 'preview');
  document.getElementById('tab-btn-markdown').classList.toggle('active', tab === 'markdown');
  if (tab === 'preview') requestAnimationFrame(fitPreview);
}

function copyMarkdown() {
  if (!currentMdContent) return;
  navigator.clipboard.writeText(currentMdContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'コピーしました！';
    btn.classList.add('copied');
    setTimeout(resetCopyBtn, 2000);
  });
}

function resetCopyBtn() {
  const btn = document.getElementById('copy-btn');
  btn.textContent = 'コピー';
  btn.classList.remove('copied');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeOverlay({ target: document.getElementById('overlay') });
});

buildGallery();
</script>
